<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep charcoal background - professional, not AI-generic -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0f1623"/>
    </linearGradient>

    <!-- Hexagon stroke gradient - cool silver tones -->
    <linearGradient id="hexStroke" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>

    <!-- Checkmark gradient - emerald for quality/correctness -->
    <linearGradient id="checkGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Subtle outer glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Background squircle (macOS style) -->
  <rect width="1024" height="1024" rx="226" ry="226" fill="url(#bg)"/>

  <!-- Subtle hexagon glow for depth -->
  <polygon
    points="512,262 728,387 728,637 512,762 296,637 296,387"
    fill="none"
    stroke="#64748b"
    stroke-width="24"
    stroke-linejoin="round"
    opacity="0.15"
    filter="url(#softGlow)"
  />

  <!-- Hexagon interior - slightly lighter than background for depth -->
  <polygon
    points="512,262 728,387 728,637 512,762 296,637 296,387"
    fill="#151b2d"
  />

  <!-- Main hexagon outline - 6 sides = GOLDEN 6 dimensions -->
  <polygon
    points="512,262 728,387 728,637 512,762 296,637 296,387"
    fill="none"
    stroke="url(#hexStroke)"
    stroke-width="24"
    stroke-linejoin="round"
  />

  <!-- Bold checkmark - quality verification -->
  <polyline
    points="370,520 472,635 660,390"
    fill="none"
    stroke="url(#checkGrad)"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Golden accent dot at top vertex - GOLDEN framework reference -->
  <circle cx="512" cy="262" r="14" fill="#f59e0b" opacity="0.9"/>
</svg>
